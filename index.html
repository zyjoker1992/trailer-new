<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MA Trading - Factory Tracker Pro Bilingual Defect Report</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#f8fafc;font-family:"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;color:#0f172a;overflow:hidden;font-size:14px}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
textarea{resize:vertical}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 18px;display:flex;align-items:center;gap:18px;box-shadow:0 1px 3px rgba(15,23,42,.04);z-index:20}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand-icon{width:38px;height:38px;border-radius:10px;background:#2563eb;color:#fff;display:grid;place-items:center;font-size:18px;font-weight:900}
.brand-name{font-size:18px;font-weight:900;line-height:1.1}
.brand-sub{font-size:11px;color:#64748b;line-height:1.2;margin-top:2px}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.stat{padding:7px 12px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;min-width:94px;text-align:center}
.stat strong{display:block;font-size:18px;line-height:1}
.stat span{display:block;font-size:11px;color:#64748b;line-height:1.2;margin-top:3px}
.actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:10px;padding:8px 12px;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15;transition:.15s}
.btn:hover{transform:translateY(-1px);border-color:#94a3b8}
.btn span:last-child{font-size:10px;color:#64748b}
.btn.primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn.primary span:last-child,.btn.success span:last-child,.btn.warn span:last-child,.btn.danger span:last-child{color:rgba(255,255,255,.82)}
.btn.success{background:#16a34a;color:#fff;border-color:#16a34a}
.btn.warn{background:#d97706;color:#fff;border-color:#d97706}
.btn.danger{background:#dc2626;color:#fff;border-color:#dc2626}
.workspace{display:flex;flex:1;min-height:0}
.sidebar{width:340px;min-width:340px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;min-height:0}
.sb-search{padding:12px;border-bottom:1px solid #e2e8f0}
.ipt{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;background:#fff;color:#0f172a;outline:none}
.ipt:focus,.txt:focus,.sel:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.tabs{display:flex;gap:0;border-bottom:1px solid #e2e8f0;overflow:auto}
.tab{border:none;background:#fff;padding:10px 12px;border-bottom:3px solid transparent;min-width:84px;color:#64748b}
.tab.on{color:#2563eb;border-bottom-color:#2563eb}
.bi{display:flex;flex-direction:column;line-height:1.2}
.bi .en{font-size:11px;color:#64748b}
.order-list{flex:1;overflow:auto;padding:10px;background:#f8fafc}
.orow{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px 14px 12px 18px;margin-bottom:8px;cursor:pointer;position:relative;transition:.15s}
.orow:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,23,42,.05)}
.orow.sel{border-color:#2563eb;background:#eff6ff}
.orow-accent{position:absolute;left:0;top:10px;bottom:10px;width:4px;border-radius:0 3px 3px 0}
.orow-num{font-family:"Consolas","Courier New",monospace;font-size:22px;font-weight:900;line-height:1}
.orow-title{margin-top:4px;color:#334155;font-weight:700;line-height:1.35}
.orow-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{padding:4px 8px;border-radius:999px;background:#f1f5f9;border:1px solid #e2e8f0;font-size:11px;color:#475569}
.progress{height:5px;border-radius:999px;background:#e2e8f0;margin-top:10px;overflow:hidden}
.progress > div{height:100%}
.detail{flex:1;overflow:auto;background:#f1f5f9;padding:20px;min-width:0}
.empty{display:grid;place-items:center;height:100%;color:#94a3b8;text-align:center;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:18px}
.span-12{grid-column:span 12}
.span-8{grid-column:span 8}
.span-4{grid-column:span 4}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.03)}
.card-h{padding:16px 18px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;gap:12px;align-items:center}
.card-b{padding:18px}
.card-title{font-weight:900;color:#0f172a}
.card-title .en{font-size:11px;color:#64748b}
.hero{display:flex;gap:18px;align-items:flex-start}
.hero-main{flex:1;min-width:0}
.hero-num{font-family:"Consolas","Courier New",monospace;font-size:42px;font-weight:900;line-height:1}
.hero-product{font-size:20px;font-weight:800;line-height:1.3;margin-top:6px}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.hero-side{text-align:right;min-width:220px}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px}
.hero-days{font-size:52px;font-weight:900;line-height:1}
.hero-pct{font-size:18px;font-weight:900;margin-top:10px}
.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.info-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:12px}
.info-item.full{grid-column:span 2}
.lbl{display:flex;flex-direction:column;font-size:11px;color:#64748b;line-height:1.2;margin-bottom:6px;font-weight:700}
.sel,.txt{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;background:#fff;outline:none}
.txt{min-height:92px}
.steps{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.step{border:1px solid #e2e8f0;border-radius:12px;padding:12px;background:#fff}
.step.done{background:#f0fdf4;border-color:#bbf7d0}
.step-top{display:flex;gap:10px;align-items:center}
.step-toggle{width:22px;height:22px;border-radius:999px;border:2px solid #cbd5e1;background:#fff;font-weight:900;color:#fff}
.step.done .step-toggle{background:#16a34a;border-color:#16a34a}
.photo-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.pthumb{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid #e2e8f0;cursor:pointer;background:#f8fafc}
.add-mini{width:44px;height:44px;border-radius:8px;border:2px dashed #cbd5e1;background:#fff;color:#94a3b8;font-size:20px}
.check-cat{font-size:11px;font-weight:900;color:#2563eb;margin:16px 0 8px}
.check-cat:first-child{margin-top:0}
.check{border:1px solid #e2e8f0;background:#f8fafc;border-radius:12px;padding:12px;margin-bottom:8px}
.check-top{display:flex;gap:12px;align-items:flex-start}
.check-name{flex:1;font-weight:700;line-height:1.35}
.check-actions{display:flex;gap:6px}
.check-btn{border:1px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 10px;font-size:11px}
.check-btn.on.pass{background:#16a34a;border-color:#16a34a;color:#fff}
.check-btn.on.recheck{background:#d97706;border-color:#d97706;color:#fff}
.note-row{display:flex;gap:6px;align-items:flex-start}
.timeline-item{display:flex;gap:12px;margin-bottom:14px}
.timeline-dot{width:10px;height:10px;border-radius:999px;background:#2563eb;margin-top:8px;flex-shrink:0}
.timeline-main{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:12px}
.timeline-date{font-size:11px;color:#64748b;margin-bottom:6px}
.defect-toolbar{display:flex;gap:8px;flex-wrap:wrap}
.defect-list{display:grid;gap:10px}
.defect-item{display:grid;grid-template-columns:92px minmax(0,1fr) auto;gap:12px;padding:12px;border:1px solid #e2e8f0;border-radius:12px;background:#f8fafc;align-items:start}
.defect-img{width:92px;height:92px;border-radius:10px;object-fit:cover;background:#e2e8f0;border:1px solid #cbd5e1;cursor:pointer}
.defect-main{min-width:0}
.defect-title{font-size:15px;font-weight:800;line-height:1.3}
.defect-sub{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.defect-note{margin-top:8px;color:#475569;line-height:1.45}
.defect-actions{display:flex;flex-direction:column;gap:6px}
.thumb-grid{display:flex;gap:8px;flex-wrap:wrap}
.muted{color:#64748b}
.small{font-size:12px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:1000}
.modal.show{display:flex}
.modal-c{background:#fff;border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.modal-c.wide{max-width:1280px}
.modal-h{padding:16px 18px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-b{padding:18px;overflow:auto}
.modal-f{padding:16px 18px;border-top:1px solid #e2e8f0;background:#f8fafc;display:flex;justify-content:flex-end;gap:8px}
.annotator{display:grid;grid-template-columns:minmax(0,1fr) 320px;min-height:72vh}
.annotator-left{padding:16px;background:#e2e8f0;display:grid;place-items:center}
.annotator-stage{position:relative;display:grid;place-items:center;width:100%;height:100%;background:linear-gradient(45deg,#f8fafc 25%,#e2e8f0 25%,#e2e8f0 50%,#f8fafc 50%,#f8fafc 75%,#e2e8f0 75%,#e2e8f0 100%);background-size:22px 22px;border-radius:12px;overflow:auto}
.annotator-right{border-left:1px solid #e2e8f0;background:#fff;overflow:auto}
canvas{display:block;background:#fff;box-shadow:0 14px 28px rgba(15,23,42,.18);border-radius:8px;max-width:100%;max-height:70vh}
.anno-list{display:grid;gap:8px;margin-top:12px}
.anno-item{padding:10px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc}
.report{display:none;padding:0;background:#fff;color:#000;font-family:"Times New Roman",serif;max-width:1050px;margin:0 auto}
.rep-page{padding:16mm 14mm 14mm;page-break-after:always}
.rep-page:last-child{page-break-after:auto}
.rep-h{text-align:center;border-bottom:3px solid #000;padding-bottom:10px;margin-bottom:18px}
.rep-t{font-size:30px;font-weight:bold}
.rep-st{font-size:16px;margin-top:6px}
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:2px solid #000;margin-bottom:18px}
.rep-cell{border:1px solid #000;padding:10px;font-size:14px;min-height:48px;line-height:1.45}
.rep-tbl{width:100%;border-collapse:collapse;border:2px solid #000;margin-bottom:18px}
.rep-tbl th,.rep-tbl td{border:1px solid #000;padding:8px;font-size:13px;vertical-align:top;line-height:1.4}
.rep-tbl th{background:#efefef}
.rep-cat{background:#e5e7eb;font-weight:bold}
.rep-photo{width:100%;border:1px solid #000;margin-top:10px}
.rep-sign{display:flex;justify-content:space-between;gap:20px;margin-top:34px}
.rep-sign div{width:45%;border-top:2px solid #000;padding-top:8px;text-align:center}
.rep-note{border:2px solid #000;padding:10px 12px;margin-bottom:18px;font-size:13px;line-height:1.5}
.rep-photo-grid-4,.rep-photo-grid-6{display:grid;gap:10px}
.rep-photo-grid-4{grid-template-columns:repeat(2,1fr)}
.rep-photo-grid-6{grid-template-columns:repeat(2,1fr)}
.rep-photo-card{border:1px solid #000;padding:8px}
.rep-photo-frame{width:100%;height:220px;border:1px solid #000;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden}
.rep-photo-card img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
.rep-photo-grid-6 .rep-photo-frame{height:160px}
.rep-photo-cap{font-size:12px;line-height:1.35;margin-top:6px;min-height:32px}
.rep-section-title{font-size:18px;font-weight:bold;margin-bottom:12px}
.rep-group-title{font-size:16px;font-weight:bold;margin-bottom:10px}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:1200;padding:30px}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain}
@media (max-width:1200px){
  .span-8,.span-4{grid-column:span 12}
  .annotator{grid-template-columns:1fr}
  .annotator-right{border-left:none;border-top:1px solid #e2e8f0}
}
@media (max-width:900px){
  body{overflow:auto}
  .workspace{flex-direction:column}
  .sidebar{width:100%;min-width:0;max-height:44vh}
  .detail{padding:12px}
  .steps{grid-template-columns:repeat(2,minmax(0,1fr))}
  .hero{flex-direction:column}
  .hero-side{text-align:left}
  .hero-actions{justify-content:flex-start}
  .defect-item{grid-template-columns:1fr}
}
.ov-wrap{height:100%;display:flex;flex-direction:column;overflow:hidden}
.ov-toolbar{padding:12px 18px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.ov-table-wrap{flex:1;overflow:auto}
.ov-tbl{width:100%;border-collapse:collapse;font-size:13px}
.ov-tbl th{position:sticky;top:0;background:#1e293b;color:#fff;padding:10px 12px;text-align:left;font-weight:700;white-space:nowrap;z-index:2}
.ov-tbl td{padding:9px 12px;border-bottom:1px solid #e2e8f0;vertical-align:middle}
.ov-tbl tr:hover td{background:#f8fafc}
.ov-tbl tr.ov-critical td{background:#fef2f2}
.ov-tbl tr.ov-high td{background:#fff7ed}
.ov-tbl tr.ov-medium td{background:#f0fdf4}
.ov-tbl tr.ov-low td{background:#eff6ff}
.ov-tbl tr.ov-critical:hover td,.ov-tbl tr.ov-high:hover td,.ov-tbl tr.ov-medium:hover td,.ov-tbl tr.ov-low:hover td{filter:brightness(0.97)}
.ov-bar{height:8px;border-radius:999px;background:#e2e8f0;width:80px;display:inline-block;vertical-align:middle}
.ov-bar-fill{height:100%;border-radius:999px}
.ov-tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.ov-group-hdr td{background:#1e293b!important;color:#fff;font-weight:900;font-size:12px;padding:6px 12px;letter-spacing:.5px}
.view-toggle{display:flex;gap:0;border:1px solid #cbd5e1;border-radius:10px;overflow:hidden}
.view-toggle button{border:none;background:#fff;color:#64748b;padding:8px 14px;font-size:13px;font-weight:600;transition:.15s}
.view-toggle button.on{background:#2563eb;color:#fff}
@media print{
  .ov-tbl th{background:#1e293b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:auto;margin:0}
  html,body{background:#fff;height:auto;overflow:visible}
  .shell,.modal,.lightbox{display:none !important}
  #report-container{display:block !important}
}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr" id="hdr"></div>
  <div class="workspace">
    <aside class="sidebar" id="sidebarEl">
      <div class="sb-search">
        <input class="ipt" id="searchInput" placeholder="搜索订单 / Search orders">
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="order-list" id="orderList"></div>
    </aside>
    <main class="detail" id="detail"></main>
  </div>
</div>

<div id="report-container" class="report"></div>

<div class="modal" id="newModal">
  <div class="modal-c">
    <div class="modal-h">
      <div class="card-title bi"><span>新增订单</span><span class="en">New Order</span></div>
      <button class="btn" onclick="closeNew()"><span>关闭</span><span>Close</span></button>
    </div>
    <div class="modal-b">
      <div class="info-grid">
        <div class="info-item"><label class="lbl"><span>订单号</span><span class="en">Order ID</span></label><input class="sel" id="nf-id"></div>
        <div class="info-item"><label class="lbl"><span>产品名称</span><span class="en">Product</span></label><input class="sel" id="nf-product"></div>
        <div class="info-item"><label class="lbl"><span>开始日期</span><span class="en">Start Date</span></label><input class="sel" id="nf-start" placeholder="YYYY.M.D"></div>
        <div class="info-item"><label class="lbl"><span>预计装车日期</span><span class="en">Load Date</span></label><input class="sel" id="nf-due" placeholder="YYYY.M.D"></div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeNew()"><span>取消</span><span>Cancel</span></button>
      <button class="btn primary" onclick="submitNew()"><span>保存</span><span>Save</span></button>
    </div>
  </div>
</div>

<div class="modal" id="defectModal">
  <div class="modal-c wide">
    <div class="modal-h">
      <div class="card-title bi"><span>缺陷照片标注</span><span class="en">Defect Photo Annotation</span></div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="setAnnotatorTool('pan')"><span>浏览</span><span>Pan</span></button>
        <button class="btn primary" onclick="setAnnotatorTool('rect')"><span>画框</span><span>Draw Box</span></button>
        <button class="btn" onclick="closeDefectModal()"><span>关闭</span><span>Close</span></button>
      </div>
    </div>
    <div class="annotator">
      <div class="annotator-left">
        <div class="annotator-stage">
          <canvas id="annoCanvas"></canvas>
        </div>
      </div>
      <div class="annotator-right">
        <div class="modal-b">
          <div class="info-grid">
            <div class="info-item full"><label class="lbl"><span>缺陷标题</span><span class="en">Defect Title</span></label><input class="sel" id="def-title"></div>
            <div class="info-item"><label class="lbl" style="display:flex;justify-content:space-between;align-items:center"><span>缺陷分类 / Category</span><button class="btn" style="padding:2px 8px;font-size:10px" onclick="openDefectTypeMgr()">+ 管理</button></label>
              <select class="sel" id="def-type"></select>
            </div>
            <div class="info-item"><label class="lbl"><span>严重等级</span><span class="en">Severity</span></label>
              <select class="sel" id="def-severity">
                <option value="高 / High">高 / High</option>
                <option value="中 / Medium">中 / Medium</option>
                <option value="低 / Low">低 / Low</option>
              </select>
            </div>
            <div class="info-item"><label class="lbl"><span>状态</span><span class="en">Status</span></label>
              <select class="sel" id="def-status">
                <option value="待处理 / Open">待处理 / Open</option>
                <option value="整改中 / In Progress">整改中 / In Progress</option>
                <option value="已关闭 / Closed">已关闭 / Closed</option>
              </select>
            </div>
            <div class="info-item"><label class="lbl"><span>位置</span><span class="en">Location</span></label><input class="sel" id="def-location" placeholder="例如：左后侧护板 / Left rear panel"></div>
            <div class="info-item full"><label class="lbl"><span>描述与整改建议</span><span class="en">Description & Action</span></label><textarea class="txt" id="def-note"></textarea></div>
          </div>
          <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn success" id="saveDefectBtn"><span>保存缺陷</span><span>Save Defect</span></button>
            <button class="btn" id="undoAnnoBtn"><span>撤销框选</span><span>Undo Box</span></button>
            <button class="btn danger" id="clearAnnoBtn"><span>清空框选/span><span>Clear Boxes</span></button>
          </div>
          <div class="anno-list" id="annoList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="defectTypeMgrModal">
  <div class="modal-c" style="max-width:620px">
    <div class="modal-h">
      <div class="card-title bi"><span>缺陷类型管理</span><span class="en">Defect Type Manager</span></div>
      <button class="btn" onclick="closeDefectTypeMgr()"><span>关闭</span><span>Close</span></button>
    </div>
    <div class="modal-b" style="max-height:60vh;overflow:auto">
      <div id="defectTypeList" style="display:grid;gap:6px;margin-bottom:16px"></div>
      <div style="border-top:1px solid #e2e8f0;padding-top:16px">
        <div class="lbl" style="font-weight:900;margin-bottom:10px"><span>➕ 新增缺陷类型（中英文均需填写）</span><span class="en">Add New Type (both languages required)</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end">
          <div><label class="lbl"><span>中文名称</span></label><input class="sel" id="new-type-zh" placeholder="例：油漆不良"></div>
          <div><label class="lbl"><span>English Name</span></label><input class="sel" id="new-type-en" placeholder="e.g. Poor paint"></div>
          <button class="btn primary" onclick="addDefectType()" style="height:42px;padding:0 16px"><span>保存</span><span>Save</span></button>
        </div>

// Migrate old inline-dataUrl photos to separate keys (runs once on first load)
async function migrateInlinePhotos(){
  let any=false;
  for(const [oid,data] of Object.entries(DB)){
    let changed=false;
    const migPh=async obj=>{
      if(obj?.dataUrl&&!obj.photoId){obj.photoId=await savePhoto(obj.dataUrl);delete obj.dataUrl;changed=true;}
    };
    for(const d of data.defects||[]){
      await migPh(d.photo);
      if(d.annotatedDataUrl&&!d.annotatedPhotoId){d.annotatedPhotoId=await savePhoto(d.annotatedDataUrl);delete d.annotatedDataUrl;changed=true;}
    }
    for(const ph of data.detailPhotos||[]) await migPh(ph);
    for(const list of Object.values(data.stepPhotos||{})) for(const ph of list||[]) await migPh(ph);
    for(const note of data.notes||[]) for(const ph of note.photos||[]) await migPh(ph);
    await migPh(data.drawing);
    if(changed){await STORAGE.set(orderKey(oid),data);any=true;}
  }
  return any;
}

function pd(s){if(!s)return null;const [y,m,d]=s.split(".");return new Date(+y,+m-1,+d);}
function daysLeft(s){const d=pd(s);return d?Math.ceil((d-TODAY)/86400000):null;}
function urgency(days){if(days===null)return"low";if(days<=7)return"critical";if(days<=14)return"high";if(days<=30)return"medium";return"low";}
function pctColor(p){return p>=75?"#16a34a":p>=50?"#d97706":p>0?"#f97316":"#dc2626";}

function fmtDateTime(ts){return ts?new Date(ts).toLocaleString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";}
function chunk(arr,size){const out=[];for(let i=0;i<arr.length;i+=size)out.push(arr.slice(i,i+size));return out;}
function groupBy(arr,keyFn){
  const map=new Map();
  arr.forEach(item=>{
    const key=keyFn(item);
    if(!map.has(key)) map.set(key,[]);
    map.get(key).push(item);
  });
  return Array.from(map.entries());
}

async function loadState(){
  EXTRA=(await STORAGE.get(ORDERS_KEY))||[];
  CUSTOM_TYPES=(await STORAGE.get(TYPES_KEY))||[];
  DB={};
  // Migrate from old single-key format if present
  const oldDB=await STORAGE.get("factory-tracker-v20-bilingual");
  if(oldDB&&Object.keys(oldDB).length){
    DB=oldDB;
    await migrateInlinePhotos();
    await Promise.all(Object.entries(DB).map(([id,data])=>STORAGE.set(orderKey(id),data)));
    try{await window.storage?.delete("factory-tracker-v20-bilingual");}catch(e){}
    return;
  }
  // Load each order's metadata from its own key
  const allIds=[...new Set([...EXTRA.map(o=>o.i),...DEFAULT_ORDERS.map(o=>o.i)])];
  const results=await Promise.all(allIds.map(id=>STORAGE.get(orderKey(id))));
  allIds.forEach((id,i)=>{if(results[i]) DB[id]=results[i];});
  // Migrate any existing inline photos to separate keys
  await migrateInlinePhotos();
}
async function saveState(){
  await STORAGE.set(ORDERS_KEY,EXTRA);
  await STORAGE.set(TYPES_KEY,CUSTOM_TYPES);
  await Promise.all(Object.entries(DB).map(([id,data])=>STORAGE.set(orderKey(id),data)));
}

function orderPriority(id, orderD){
  const ld=getEffLoadDate(id,orderD);
  return ensureDb(id).manualPriority || urgency(daysLeft(ld));
}
function priorityRank(key){
  return {critical:0,high:1,medium:2,low:3}[key] ?? 9;
}
async function setLoadDate(id, val){
  ensureDb(id).loadDate=val;

}

function collectDetailPhotos(db){
  const photos=[];
  (db.detailPhotos||[]).forEach((ph,idx)=>photos.push({category:ph.category||"Product detail view",label:ph.label||`Detail ${idx+1}`,dataUrl:resolveUrl(ph)}));
  Object.entries(db.stepPhotos||{}).forEach(([step,list])=>{
    (list||[]).forEach((ph,idx)=>photos.push({category:`Step - ${step}`,label:`${step} ${idx+1}`,dataUrl:resolveUrl(ph)}));
  });
  (db.notes||[]).forEach((note,idx)=>{
    (note.photos||[]).forEach((ph,j)=>photos.push({category:"History",label:`History ${idx+1}-${j+1}`,dataUrl:resolveUrl(ph)}));
  });
  return photos;
}

function summarizeDefects(defects){
  const map=new Map();
  defects.forEach(d=>{
    const key=d.title?.trim()||d.type||"Other";
    map.set(key,(map.get(key)||0)+1);
  });
  return Array.from(map.entries()).map(([name,count])=>({name,count}));
}

function getFilteredOrders(){
  return allOrders()
    .slice()
    .filter(o=>!ensureDb(o.i).archived)
    .sort((a,b)=>{
      const pa=priorityRank(orderPriority(a.i,a.d));
      const pb=priorityRank(orderPriority(b.i,b.d));
      if(pa!==pb) return pa-pb;
      return (daysLeft(getEffLoadDate(a.i,a.d))??999)-(daysLeft(getEffLoadDate(b.i,b.d))??999);
    })
    .filter(o=>filter==="all"||urgency(daysLeft(getEffLoadDate(o.i,o.d)))===filter)
    .filter(o=>{
      if(!searchQuery.trim()) return true;
      const q=searchQuery.trim().toLowerCase();
      return o.i.toLowerCase().includes(q)||o.p.toLowerCase().includes(q);
    });
}

function renderTabs(){
  const all=allOrders().filter(o=>!ensureDb(o.i).archived);
  document.getElementById("tabs").innerHTML=FILTERS.map(f=>{
    const count=f.key==="all"?all.length:all.filter(o=>urgency(daysLeft(getEffLoadDate(o.i,o.d)))===f.key).length;
    return `
    <button class="tab ${filter===f.key?"on":""}" onclick="setFilter('${f.key}')">
      <span class="bi"><span>${f.zh} <strong style="font-size:14px">${count}</strong></span><span class="en">${f.en}</span></span>
    </button>`;
  }).join("");
}

function renderSidebar(){
  const list=getFilteredOrders();
  document.getElementById("orderList").innerHTML=list.length?list.map(o=>{

    const stage=STAGES[ensureDb(o.i).stage]||{zh:ensureDb(o.i).stage,en:ensureDb(o.i).stage};

function renderOverview(){
  const el=document.getElementById("detail");
  const orders=allOrders()
    .filter(o=>!ensureDb(o.i).archived)
    .sort((a,b)=>{
      const pa=priorityRank(orderPriority(a.i,a.d));
      const pb=priorityRank(orderPriority(b.i,b.d));
      if(pa!==pb) return pa-pb;
      return (daysLeft(getEffLoadDate(a.i,a.d))??999)-(daysLeft(getEffLoadDate(b.i,b.d))??999);
    });

  // Group by load date bucket
  const buckets=new Map();
  orders.forEach(o=>{
    const ld=getEffLoadDate(o.i,o.d);
    const days=daysLeft(ld);
    const label=!ld?"未排装车日期 / No Load Date":
      days<0?"已过期 / Overdue":
      days===0?"今日装车 / Today":
      days<=7?"🚨 紧急（≤7天）/ Urgent":
      days<=14?"⚡ 高优先（≤14天）/ High":
      days<=30?"本月内 / This Month":
      "较宽裕 / Low Priority";
    if(!buckets.has(label)) buckets.set(label,[]);
    buckets.get(label).push(o);
  });

  const stageColors={"not started":"#94a3b8","making outside":"#3b82f6","making inside":"#8b5cf6","painting":"#f59e0b","finishing":"#f97316","ready for inspection":"#06b6d4","inspection pending fix":"#ef4444","inspection passed":"#22c55e","ready to ship":"#10b981","shipped":"#64748b"};

  let rows="";
  let rowNum=0;
  for(const [bucket,list] of buckets){
    rows+=`<tr class="ov-group-hdr"><td colspan="11">📦 ${esc(bucket)} &nbsp;—&nbsp; ${list.length} 个订单</td></tr>`;
    list.forEach(o=>{
      rowNum++;
      const db=ensureDb(o.i);
      const ld=getEffLoadDate(o.i,o.d);
      const days=daysLeft(ld);
      const u=orderPriority(o.i,o.d);
      const col=COL[u];
      const stage=STAGES[db.stage]||{zh:db.stage,en:db.stage};
      const stageColor=stageColors[db.stage]||"#64748b";
      const prog=getProgress(o.i);
      const doneSteps=STEPS.filter(s=>db.steps[s.key]).length;
      const defCnt=db.defects.length;
      const openDef=db.defects.filter(d=>!(d.status||"").includes("Closed")).length;
      const fu=FOLLOW_UPS[db.followUp]||{zh:db.followUp,en:db.followUp};
      const daysStr=days===null?`<span style="color:#94a3b8">— / N/A</span>`:
        days<0?`<span style="color:#dc2626;font-weight:700">⚠ 已过期 / Overdue<br><small>${Math.abs(days)}天 / days</small></span>`:
        days<=7?`<span style="color:#dc2626;font-weight:700">🚨 ${days}天 / days</span>`:
        days<=14?`<span style="color:#d97706;font-weight:700">${days}天 / days</span>`:
        `${days}天 / days`;
      const checkDone=Object.values(db.checks||{}).filter(v=>v==="pass").length;
      const checkTotal=CHECKLIST.length;
      rows+=`
        <tr class="ov-${u}" onclick="setViewMode('orders');selectOrder('${o.i}')" style="cursor:pointer">
          <td style="color:#94a3b8;font-size:12px">${rowNum}</td>
          <td><strong style="font-family:monospace">${esc(o.i)}</strong></td>

async function exportToExcel(){
  // Load SheetJS dynamically
  if(!window.XLSX){
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  const orders=allOrders()
    .filter(o=>!ensureDb(o.i).archived)
    .sort((a,b)=>{
      const pa=priorityRank(orderPriority(a.i,a.d));
      const pb=priorityRank(orderPriority(b.i,b.d));
      return pa!==pb?pa-pb:(daysLeft(getEffLoadDate(a.i,a.d))??999)-(daysLeft(getEffLoadDate(b.i,b.d))??999);
    });

  const stepHeaders=STEPS.map(s=>`${s.zh} / ${s.en}`);
  const data=[
    [
      "订单号 / Order No.", "产品名称 / Product", "当前阶段 / Stage", "开始日期 / Start Date",
      "预计装车日期 / Load Date", "剩余天数 / Days Left", "生产进度% / Progress%",
      ...stepHeaders,
      "缺陷总数 / Total Defects", "待处理缺陷 / Open Defects",
      "检查通过项 / Checklist Pass", "检查总项 / Checklist Total",
      "跟进状态 / Follow-up", "优先级 / Priority", "最新备注 / Latest Note"
    ]
  ];
  orders.forEach(o=>{
    const db=ensureDb(o.i);
    const ld=getEffLoadDate(o.i,o.d);
    const days=daysLeft(ld);
    const stage=STAGES[db.stage]||{zh:db.stage,en:db.stage};
    const prog=getProgress(o.i);
    const stepStatus=STEPS.map(s=>db.steps[s.key]?"✓":"");
    const defCnt=db.defects.length;
    const openDef=db.defects.filter(d=>!(d.status||"").includes("Closed")).length;
    const checkDone=Object.values(db.checks||{}).filter(v=>v==="pass").length;
    const fu=FOLLOW_UPS[db.followUp]||{zh:db.followUp,en:db.followUp};
    const u=orderPriority(o.i,o.d);
    const col=COL[u];
    const lastNote=(db.notes||[])[0];
    data.push([
      o.i, o.p,
      `${stage.zh} / ${stage.en}`,
      o.s||"",
      ld||"",
      days===null?"N/A":days,
      prog,
      ...stepStatus,
      defCnt, openDef,
      checkDone, CHECKLIST.length,
      `${fu.zh} / ${fu.en}`,
      `${col.zh} / ${col.en}`,
      lastNote?lastNote.text:""
    ]);
  });

  const ws=XLSX.utils.aoa_to_sheet(data);
  // Column widths
  ws["!cols"]=[{wch:12},{wch:30},{wch:20},{wch:12},{wch:14},{wch:10},{wch:10},...STEPS.map(()=>({wch:10})),{wch:10},{wch:12},{wch:12},{wch:10},{wch:16},{wch:16},{wch:40}];
  // Style header row
  const range=XLSX.utils.decode_range(ws["!ref"]);
  for(let C=range.s.c;C<=range.e.c;C++){
    const cell=ws[XLSX.utils.encode_cell({r:0,c:C})];
    if(cell) cell.s={font:{bold:true},fill:{fgColor:{rgb:"1E293B"}},alignment:{horizontal:"center"}};
  }
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"生产进度");
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`factory-progress-${today}.xlsx`);
}

function fileToData(file,maxSide){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=()=>{
      if(!file.type.startsWith("image/")){
        resolve({name:file.name,type:file.type,dataUrl:reader.result,ts:new Date().toISOString()});
        return;
      }
      const img=new Image();
      img.onload=()=>{
        const ratio=Math.min(maxSide/img.width,maxSide/img.height,1);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*ratio);
        canvas.height=Math.round(img.height*ratio);
        const c=canvas.getContext("2d");
        c.drawImage(img,0,0,canvas.width,canvas.height);
        resolve({name:file.name,type:file.type,dataUrl:canvas.toDataURL("image/jpeg",0.8),width:canvas.width,height:canvas.height,ts:new Date().toISOString()});
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById("fileInput").addEventListener("change",async e=>{
  if(!uploadCtx) return;
  const files=Array.from(e.target.files||[]);
  if(!files.length) return;
  const rawItems=await Promise.all(files.map(f=>fileToData(f,1200)));
  // Save each photo to its own storage key, strip inline dataUrl from DB object
  const items=await Promise.all(rawItems.map(async item=>{
    if(!item.dataUrl) return item;
    const pid=await savePhoto(item.dataUrl);
    const{dataUrl,...rest}=item;
    return{...rest,photoId:pid};
  }));
  const db=ensureDb(uploadCtx.id);
  if(uploadCtx.type==="step"){
    if(!db.stepPhotos[uploadCtx.key]) db.stepPhotos[uploadCtx.key]=[];
    db.stepPhotos[uploadCtx.key].push(...items.filter(x=>x.type?.startsWith("image/")));
  }else if(uploadCtx.type==="detail"){
    const existing=db.detailPhotos?.length||0;
    db.detailPhotos.push(...items.filter(x=>x.type?.startsWith("image/")).map((ph,idx)=>({
      ...ph,
      category:"Product detail view",
      label:`Detail ${existing+idx+1}`
    })));
  }else if(uploadCtx.type==="drawing"){
    db.drawing=items[0];
  }else if(uploadCtx.type==="note"){
    // Keep raw items with dataUrl in memory for pending display
    window.pendingNotePhotos=(window.pendingNotePhotos||[]).concat(rawItems.filter(x=>x.type?.startsWith("image/")));
  }else if(uploadCtx.type==="batchDefect"){
    items.filter(x=>x.type?.startsWith("image/")).forEach((ph,idx)=>{
      db.defects.unshift({
        id:uid(),
        title:`缺陷 ${db.defects.length+idx+1} / Defect ${db.defects.length+idx+1}`,
        type:"其他 / Other",
        severity:"中 / Medium",
        status:"待处理 / Open",
        location:"",
        note:"",
        photo:ph,
        annotations:[]
      });
    });
  }
  await saveState();
  e.target.value="";
  if(uploadCtx.type==="batchDefect"&&db.defects[0]) openDefectModal(uploadCtx.id,db.defects[0].id);
  render();
});

function buildAnnotatedDataUrl(defect,image){
  if(!defect?.photo) return "";
  if(!(defect.annotations||[]).length) return defect.photo.dataUrl;
  const canvas=document.createElement("canvas");
  canvas.width=defect.photo.width||image?.width||1200;
  canvas.height=defect.photo.height||image?.height||800;
  const c=canvas.getContext("2d");
  if(image) c.drawImage(image,0,0,canvas.width,canvas.height);
  defect.annotations.forEach((a,index)=>{
    c.lineWidth=4;
    c.strokeStyle=a.severity.includes("High")||a.severity.includes("高")?"#dc2626":a.severity.includes("Low")||a.severity.includes("低")?"#16a34a":"#d97706";
    c.strokeRect(a.rect.x,a.rect.y,a.rect.w,a.rect.h);
    c.fillStyle=c.strokeStyle;
    c.fillRect(a.rect.x,Math.max(0,a.rect.y-24),30,24);
    c.fillStyle="#fff";
    c.font="bold 14px Segoe UI";
    c.fillText(String(index+1),a.rect.x+10,Math.max(16,a.rect.y-8));
  });
  return canvas.toDataURL("image/jpeg",0.92);
}

function getAnnotatedPhoto(defect){

function drawAnnotator(){
  const canvas=document.getElementById("annoCanvas");
  const c=canvas.getContext("2d");
  const defect=getDefect(annotator.orderId,annotator.defectId);
  if(!annotator.image||!defect) return;
  c.clearRect(0,0,canvas.width,canvas.height);
  c.drawImage(annotator.image,0,0,canvas.width,canvas.height);
  (defect.annotations||[]).forEach((a,i)=>drawRect(c,a.rect,i+1,a.severity,false));
  if(annotator.pending) drawRect(c,annotator.pending,"?",document.getElementById("def-severity").value,true);
}

function drawRect(c,rect,label,severity,dashed){
  const color=severity.includes("High")||severity.includes("高")?"#dc2626":severity.includes("Low")||severity.includes("低")?"#16a34a":"#d97706";
  c.save();
  c.lineWidth=4;
  c.strokeStyle=color;
  if(dashed) c.setLineDash([10,8]);
  c.strokeRect(rect.x,rect.y,rect.w,rect.h);
  c.fillStyle=color;
  c.fillRect(rect.x,Math.max(0,rect.y-26),34,26);
  c.fillStyle="#fff";
  c.font="bold 15px Segoe UI";
  c.fillText(String(label),rect.x+11,Math.max(17,rect.y-8));
  c.restore();
}

function pt(evt){
  const canvas=document.getElementById("annoCanvas");
  const r=canvas.getBoundingClientRect();
  return {x:(evt.clientX-r.left)*(canvas.width/r.width),y:(evt.clientY-r.top)*(canvas.height/r.height)};
}
function norm(a,b){return{x:Math.min(a.x,b.x),y:Math.min(a.y,b.y),w:Math.abs(a.x-b.x),h:Math.abs(a.y-b.y)};}

const annoCanvas=document.getElementById("annoCanvas");
annoCanvas.addEventListener("pointerdown",e=>{
  if(annotator.tool!=="rect") return;
  annotator.drag=pt(e);
  annotator.pending={x:annotator.drag.x,y:annotator.drag.y,w:0,h:0};
});
annoCanvas.addEventListener("pointermove",e=>{
  if(!annotator.drag||annotator.tool!=="rect") return;
  annotator.pending=norm(annotator.drag,pt(e));
  drawAnnotator();
});
window.addEventListener("pointerup",()=>{
  if(!annotator.drag) return;
  annotator.drag=null;
  if(annotator.pending&&(annotator.pending.w<12||annotator.pending.h<12)) annotator.pending=null;
  drawAnnotator();
});

document.getElementById("undoAnnoBtn").addEventListener("click",async()=>{
  const defect=getDefect(annotator.orderId,annotator.defectId);
  if(!defect||!(defect.annotations||[]).length) return;
  defect.annotations.pop();
  const url=buildAnnotatedDataUrl(defect,annotator.image);
  if(url&&defect.annotations.length){
    if(defect.annotatedPhotoId){PHOTO_CACHE[defect.annotatedPhotoId]=url;await STORAGE.set(photoKey(defect.annotatedPhotoId),url);}
    else defect.annotatedPhotoId=await savePhoto(url);
  }else defect.annotatedPhotoId=null;
  await saveState();
  renderAnnoList();drawAnnotator();renderDetail();
});
document.getElementById("clearAnnoBtn").addEventListener("click",async()=>{
  const defect=getDefect(annotator.orderId,annotator.defectId);
  if(!defect) return;
  defect.annotations=[];
  annotator.pending=null;
  defect.annotatedPhotoId=null;
  await saveState();
  renderAnnoList();drawAnnotator();renderDetail();
});
document.getElementById("saveDefectBtn").addEventListener("click",async()=>{
  const defect=getDefect(annotator.orderId,annotator.defectId);
  if(!defect) return;
  defect.title=document.getElementById("def-title").value.trim();
  defect.type=document.getElementById("def-type").value;
  defect.severity=document.getElementById("def-severity").value;
  defect.status=document.getElementById("def-status").value;
  defect.location=document.getElementById("def-location").value.trim();
  defect.note=document.getElementById("def-note").value.trim();
  if(annotator.pending){
    defect.annotations.push({
      label:defect.title||"缺陷框 / Box",
      severity:defect.severity,
      rect:{...annotator.pending}
    });
    annotator.pending=null;
  }
  const url=buildAnnotatedDataUrl(defect,annotator.image);
  if(url&&(defect.annotations||[]).length){
    if(defect.annotatedPhotoId){PHOTO_CACHE[defect.annotatedPhotoId]=url;await STORAGE.set(photoKey(defect.annotatedPhotoId),url);}
    else defect.annotatedPhotoId=await savePhoto(url);
  }else defect.annotatedPhotoId=null;
  await saveState();
  renderAnnoList();
  drawAnnotator();
  renderDetail();
});

function summarizeDefectsByType(defects){
  const map=new Map();
  defects.forEach(d=>{
    const key=(d.type||"其他 / Other").trim();
    if(!map.has(key)) map.set(key,{type:key,count:0,items:[]});
    const entry=map.get(key);
    entry.count++;
    entry.items.push(d);
  });
  return Array.from(map.values()).sort((a,b)=>b.count-a.count);
}

function renderReport(orderId){
  const o=allOrders().find(x=>x.i===orderId);
  if(!o) return "";
  const db=ensureDb(orderId);
  const repInfo=db.repInfo||{};
  const detailPhotos=collectDetailPhotos(db);
  const checklistGroups=groupBy(CHECKLIST,item=>`${item.catZh} / ${item.catEn}`);

  // ── Auto-group defects by type ──────────────────────────────────────────
  const typeGroups=summarizeDefectsByType(db.defects||[]);
  const totalDefects=(db.defects||[]).length;

  // Summary table rows: one row per type, with count
  const defectSummaryRows=typeGroups.length
    ? typeGroups.map((g,idx)=>`<tr><td>${idx+1}</td><td>${esc(g.type)}</td><td style="text-align:center;font-weight:700">${g.count}</td></tr>`).join("")
    : `<tr><td colspan="3">无缺陷 / No defects</td></tr>`;

  // Detailed table rows: sorted by type, same types grouped together
  const sortedDefects=[...typeGroups.flatMap(g=>g.items)];
  let lastType="";
  const defectRows=sortedDefects.length
    ? sortedDefects.map((d,idx)=>{
        const typeChanged=d.type!==lastType;
        lastType=d.type;
        const groupRow=typeChanged?`<tr style="background:#e5e7eb"><td colspan="7" style="font-weight:700;padding:6px 8px">${esc(d.type||"其他 / Other")}</td></tr>`:"";
        return groupRow+`<tr><td>${idx+1}</td><td>${esc(d.title||"")}</td><td>${esc(d.type||"")}</td><td>${esc(d.severity||"")}</td><td>${esc(d.status||"")}</td><td>${esc(d.location||"")}</td><td>${esc(d.note||"")}</td></tr>`;
      }).join("")
    : `<tr><td colspan="7">无缺陷 / No defects</td></tr>`;

  // ── Defect photo pages: grouped by type, 4 per page ────────────────────
  const defectPages=typeGroups.map(g=>chunk(g.items,4).map((group,pageIdx)=>`
    <div class="rep-page">
      <div class="rep-h"><div class="rep-t">DEFECT PHOTOS</div><div class="rep-st">${esc(o.i)} — ${esc(g.type)} (${g.count})</div></div>
      <div class="rep-photo-grid-4">
        ${group.map((d,idx)=>`
          <div class="rep-photo-card">
            <div class="rep-photo-frame"><img src="${getAnnotatedPhoto(d)}" alt=""></div>
            <div class="rep-photo-cap">
              <strong>${pageIdx*4+idx+1}. ${esc(d.title||"Defect")}</strong><br>
              ${esc(d.severity||"")}${d.location?` | ${esc(d.location)}`:""}${d.note?`<br><em>${esc(d.note)}</em>`:""}
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("")).join("");

  // ── Detail photo pages: 6 per page ─────────────────────────────────────
  const detailGroups=groupBy(detailPhotos,ph=>ph.category||"Product detail view");
  const detailPages=detailGroups.map(([groupName,items])=>chunk(items,6).map(group=>`
    <div class="rep-page">
      <div class="rep-h"><div class="rep-t">DETAIL PHOTOS</div><div class="rep-st">${esc(o.i)} — ${esc(groupName)}</div></div>
      <div class="rep-photo-grid-6">
        ${group.map((ph,idx)=>`
          <div class="rep-photo-card">
            <div class="rep-photo-frame"><img src="${ph.dataUrl}" alt=""></div>
            <div class="rep-photo-cap">${esc(ph.label||`Detail ${idx+1}`)}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("")).join("");

  // ── Checklist pages (last) ──────────────────────────────────────────────
  const checklistPages=checklistGroups.map(([groupName,items])=>{
    const rows=items.map(item=>{
      const st=db.checks[item.en];
      return `<tr><td>${esc(item.zh)}<br><small>${esc(item.en)}</small></td><td style="text-align:center">${st==="pass"?"✓":""}</td><td style="text-align:center">${st==="recheck"?"✓":""}</td><td>${esc(db.checkNotes[item.en]||"")}</td></tr>`;
    }).join("");
    return `
      <div class="rep-page">
        <div class="rep-h"><div class="rep-t">INSPECTION CHECKLIST</div><div class="rep-st">${esc(o.i)} — ${esc(groupName)}</div></div>
        <table class="rep-tbl">
          <thead><tr><th>Inspection Item / 检查项</th><th>Pass / 通过</th><th>Retest / 复检</th><th>Notes / 备注</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }).join("");

  // ── Final report: Cover → Defect List → Defect Photos → Detail Photos → Checklist ──
  return `
    <div class="rep-page">
      <div class="rep-h">
        <div class="rep-t">Factory Inspection & Defect Report</div>
        <div class="rep-st">工厂检验与缺陷报告 / Bilingual Inspection Report</div>
      </div>
      <div class="rep-note"><strong>Advice for today's inspection / 今日验货建议:</strong><br>${esc(repInfo.advice||"")}</div>
      <div class="rep-grid">
        <div class="rep-cell"><strong>Client / 客户:</strong> ${esc(repInfo.client)}</div>
        <div class="rep-cell"><strong>Attn / 联系人:</strong> ${esc(repInfo.attn)}</div>
        <div class="rep-cell"><strong>Order / 订单:</strong> ${esc(o.i)}</div>
        <div class="rep-cell"><strong>Product / 产品:</strong> ${esc(o.p)}</div>
        <div class="rep-cell"><strong>Check Date / 检验日期:</strong> ${esc(repInfo.date)}</div>
        <div class="rep-cell"><strong>Inspector / 检验员:</strong> ${esc(repInfo.inspector)}</div>
        <div class="rep-cell"><strong>Location / 工厂地点:</strong> ${esc(repInfo.location)}</div>
        <div class="rep-cell"><strong>Site / 检验地点:</strong> ${esc(repInfo.site)}</div>
        <div class="rep-cell"><strong>Inspection Type / 检验类型:</strong> ${esc(repInfo.inspectionType)}</div>
        <div class="rep-cell"><strong>Instruction Provided / 指示提供:</strong> ${esc(repInfo.instruction)}</div>
        <div class="rep-cell"><strong>Ordered Quantity / 订购数量:</strong> ${esc(repInfo.orderedQty)}</div>
        <div class="rep-cell"><strong>VIN / VIN号:</strong> ${esc(repInfo.vin)}</div>
      </div>
      <table class="rep-tbl">
        <thead><tr><th colspan="5">Product check / 产品检查</th></tr></thead>
        <tbody>
          <tr>
            <td><strong>Item No.</strong><br>${esc(o.i)}</td>
            <td><strong>Product size</strong><br>${esc(repInfo.productSize)}</td>
            <td><strong>Product N.W.</strong><br>${esc(repInfo.productWeight)}</td>
            <td><strong>Sample size</strong><br>${esc(repInfo.sampleSize)}</td>
            <td><strong>AQL / Result</strong><br>${esc(repInfo.aqlLevel)} / ${esc(repInfo.finalResult)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="rep-page">
      <div class="rep-h">
        <div class="rep-t">Defective List</div>
        <div class="rep-st">${esc(o.i)} / INSPECTION REPORT — Total: ${totalDefects} defect(s)</div>
      </div>
      <table class="rep-tbl">
        <thead><tr><th>#</th><th>Defect Type / 缺陷类型</th><th style="text-align:center">Count / 数量</th></tr></thead>
        <tbody>${defectSummaryRows}</tbody>
        ${typeGroups.length?`<tr style="background:#e5e7eb"><td colspan="2" style="font-weight:700;text-align:right">Total / 合计</td><td style="font-weight:700;text-align:center">${totalDefects}</td></tr>`:""}
      </table>
      <table class="rep-tbl">
        <thead><tr><th>#</th><th>Defect / 缺陷</th><th>Type / 分类</th><th>Severity / 等级</th><th>Status / 状态</th><th>Location / 位置</th><th>Note / 说明</th></tr></thead>
        <tbody>${defectRows}</tbody>
      </table>
      <div class="rep-sign">
        <div>Inspector Signature / 检验员签字</div>
        <div>Date / 日期</div>
      </div>
    </div>

    ${defectPages}
    ${detailPages}
    ${checklistPages}
  `;
}

function exportReportPDF(orderId){
  if(!orderId) return;
  document.getElementById("report-container").innerHTML=renderReport(orderId);
  document.title=`${orderId}-inspection-defect-report`;
  window.print();
}

document.getElementById("searchInput").addEventListener("input",e=>{
  searchQuery=e.target.value;
  renderSidebar();
});

(async function init(){
  await loadState();
  refreshDefectTypeSelect();
  const first=getFilteredOrders()[0];
  if(first) selId=first.i;
  render();
})();
</script>
